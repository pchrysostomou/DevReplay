name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Quality checks ────────────────────────────────────────────────────────
  test:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript strict check
        run: npm run lint

      - name: Run unit tests
        run: npm test

      - name: Production build
        run: npm run build

      - name: Verify build output
        run: test -f dist/server.js

  # ─── Deploy to Railway (main branch only) ──────────────────────────────────
  deploy:
    name: Deploy to Railway
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Railway
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "⚠️  RAILWAY_TOKEN not set — skipping Railway deployment."
            echo "   Add RAILWAY_TOKEN to GitHub Secrets to enable auto-deploy."
            exit 0
          fi
          npx -y @railway/cli@latest up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
